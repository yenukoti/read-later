<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
    }
    h3 { margin: 0 0 14px; font-size: 16px; color: #a5b4fc; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #333; cursor: not-allowed; }
    #status {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .loading { color: #a5b4fc; }
    .footer {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h3>Read Later</h3>
  <input id="url-input" type="text" placeholder="Leave blank to save current page" />
  <button id="save-btn">Save Article</button>
  <p id="status"></p>
  <p class="footer">Or press Alt+S on any page</p>
  <script src="popup.js"></script>
</body>
</html>
